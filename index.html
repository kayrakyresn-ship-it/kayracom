<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayra | Premium Minimalist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            letter-spacing: 1px;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. Üst Menü Çubuğu (Navbar) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #f0f0f0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #111111;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555555;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #111111;
        }

        /* 2. Dev Ana Bölüm (Hero Section) */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 80px; /* Navbar yüksekliği kadar boşluk */
            background: linear-gradient(180deg, #ffffff 0%, #f9f9f9 100%);
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #111111;
            line-height: 1.2;
            margin-bottom: 20px;
            word-spacing: 5px;
        }

        /* Tasarıma şıklık katan kalın harf vurgusu */
        .hero-title span {
            font-weight: 800;
        }

        .hero-subtitle {
            font-size: 0.95rem;
            color: #777777;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        /* Alt Kırmızı Çizgi Yerine Şık Minimalist Çizgi */
        .divider {
            width: 60px;
            height: 2px;
            background-color: #111111;
            margin-bottom: 40px;
        }

        .cta-btn {
            display: inline-block;
            border: 1px solid #111111;
            color: #111111;
            padding: 14px 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            background-color: #111111;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Üst Navigasyon Menüsü -->
    <nav class="navbar">
        <div class="logo">AURORA</div>
        <ul class="nav-links">
            <li><a href="#">ANASAYFA</a></li>
            <li><a href="#">HAKKIMIZDA</a></li>
            <li><a href="#">HİZMETLER</a></li>
            <li><a href="#">PROJELER</a></li>
            <li><a href="#">İLETİŞİM</a></li>
        </ul>
    </nav>

    <!-- Ana Karşılama Alanı -->
    <main class="hero">
        <h1 class="hero-title">BEYOND <span>LIMITS</span></h1>
        <p class="hero-subtitle">EXCLUSIVE & MINIMALIST EXPERIENCES</p>
        <div class="divider"></div>
        <a href="#" class="cta-btn">Keşfedin</a>
    </main>

</body>
</html>
