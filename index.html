<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayra Premium | The Purest Form of Luxury</title>
    <!-- Google Fonts üzerinden lüks ve şık Playfair Display fontunu dahil ediyoruz -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            letter-spacing: 1px;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. Üst Menü Çubuğu (Navbar) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #f0f0f0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        /* Lüks Kayra Premium Logosu - Fontu Değiştirildi */
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 400;
            text-transform: uppercase;
            color: #111111;
            letter-spacing: 4px;
        }

        .logo span {
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555555;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 6px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #111111;
        }

        /* Soldan Sağa Çizgi Animasyonu */
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #111111;
            transform-origin: bottom left;
            transition: transform 0.25s ease-out;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
        }

        /* 2. Dev Ana Bölüm (Hero Section) */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 80px;
            background: linear-gradient(180deg, #ffffff 0%, #f9f9f9 100%);
        }

        /* "LUXURY IN ITS PUREST FORM" Başlığı - Yeni Premium Font */
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 300; /* İnce ve zarif yapı */
            text-transform: uppercase;
            color: #111111;
            line-height: 1.3;
            margin-bottom: 25px;
            word-spacing: 5px;
            letter-spacing: 2px;
        }

        /* İstediğin Kalın ve Vurgulu Kısım (PUREST FORM) */
        .hero-title span {
            font-family: 'Playfair Display', serif;
            font-weight: 900; /* Ekstra kalın yapı ile tam vurgu */
        }

        /* Alt Başlık */
        .hero-subtitle {
            font-size: 0.9rem;
            color: #777777;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
        }

        /* İnce Şık Çizgi */
        .divider {
            width: 60px;
            height: 2px;
            background-color: #111111;
            margin-bottom: 40px;
        }

        /* Buton */
        .cta-btn {
            display: inline-block;
            border: 1px solid #111111;
            color: #111111;
            padding: 14px 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            background-color: #111111;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <!-- Logo alanındaki font da lüks görünüme uyarlandı -->
        <div class="logo">Kayra <span>Premium</span></div>
        <ul class="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#">COLLECTION</a></li>
            <li><a href="#">ABOUT US</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
    </nav>

    <main class="hero">
        <!-- İngilizceye çevrildi, vurgulamak istediğin kalın kısım span içinde korundu -->
        <h1 class="hero-title">LUXURY IN ITS <span>PUREST FORM</span></h1>
        <p class="hero-subtitle">KAYRA PREMIUM COLLECTION</p>
        <div class="divider"></div>
        <a href="#" class="cta-btn">Explore Collection</a>
    </main>

</body>
</html>
