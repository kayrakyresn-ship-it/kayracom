<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayra Premium | The Purest Form of Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; color: #111111; font-family: 'Playfair Display', serif; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 40px 8%; position: fixed; width: 100%; z-index: 1000; background: #fff; }
        .logo { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 6px; }
        .nav-links { display: flex; list-style: none; gap: 40px; }
        .nav-links a { text-decoration: none; color: #111; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }

        /* Hero */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-size: 5rem; font-weight: 900; text-transform: uppercase; }
        .hero-subtitle { font-size: 1.2rem; letter-spacing: 8px; color: #555; margin-top: 20px; }

        /* İstatistik Bölümü (Yeni) */
        .stats-section { display: flex; justify-content: space-around; padding: 100px 5%; background: #f9f9f9; text-align: center; }
        .stat-item { flex: 1; padding: 20px; }
        .stat-item h3 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        .stat-item p { font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        section { padding: 100px 15%; text-align: center; }
        .content-box { border: 2px solid #111; padding: 60px; }

        @media (max-width: 768px) {
            .stats-section { flex-direction: column; gap: 40px; }
            .hero-title { font-size: 3rem; }
        }
    </style>
</head>
<body id="home">

    <nav class="navbar">
        <div class="logo">KAYRA <span>PREMIUM</span></div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#about">ABOUT</a></li>
            <li><a href="#stats">STATS</a></li>
        </ul>
    </nav>

    <main class="hero">
        <h1 class="hero-title">PURE LUXURY</h1>
        <p class="hero-subtitle">THE ART OF PERFECTION</p>
    </main>

    <section id="about">
        <h2>ABOUT US</h2>
        <div class="content-box">
            <h3>A Vision Defined</h3>
            <p>Kayra Premium represents more than fashion; it represents a lifestyle.</p>
        </div>
    </section>

    <section id="stats" class="stats-section">
        <div class="stat-item">
            <h3 class="counter" data-target="100">%100</h3>
            <p>El İşçiliği</p>
        </div>
        <div class="stat-item">
            <h3 class="counter" data-target="99">%99</h3>
            <p>Müşteri Memnuniyeti</p>
        </div>
        <div class="stat-item">
            <h3 class="counter" data-target="10">10+</h3>
            <p>Global Varlık</p>
        </div>
    </section>

    <script>
        const counters = document.querySelectorAll('.counter');
        let animated = false;

        const animateCounters = () => {
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                const updateCount = () => {
                    const count = +counter.innerText.replace('%', '').replace('+', '');
                    const increment = target / 50; 
                    if(count < target) {
                        counter.innerText = Math.ceil(count + increment) + (counter.getAttribute('data-target').includes('%') ? '%' : '+');
                        setTimeout(updateCount, 30);
                    } else {
                        counter.innerText = target + (counter.getAttribute('data-target').includes('%') ? '%' : '+');
                    }
                };
                updateCount();
            });
        };

        window.addEventListener('scroll', () => {
            const statsSection = document.getElementById('stats');
            const position = statsSection.getBoundingClientRect().top;
            if(position < window.innerHeight && !animated) {
                animateCounters();
                animated = true;
            }
        });
    </script>
</body>
</html>
