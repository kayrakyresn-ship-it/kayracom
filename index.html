<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayra Premium | The Purest Form of Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; color: #111111; font-family: 'Playfair Display', serif; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 40px 8%; position: fixed; width: 100%; z-index: 1000; background: #fff; }
        .logo { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 6px; }
        .nav-links { display: flex; list-style: none; gap: 40px; }
        .nav-links a { text-decoration: none; color: #111; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }

        /* Hero */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-size: 5rem; font-weight: 900; text-transform: uppercase; }
        .hero-subtitle { font-size: 1.2rem; letter-spacing: 8px; color: #555; margin-top: 20px; }

        /* Stats */
        .stats-section { display: flex; justify-content: space-around; padding: 100px 15%; background: #050505; color: #fff; text-align: center; }
        .stat-item h3 { font-size: 3.5rem; font-weight: 900; }
        .stat-item p { font-size: 1rem; color: #ccc; margin-top: 10px; }

        section { padding: 150px 15%; text-align: center; }
        .content-box { border: 2px solid #111; padding: 80px; }
    </style>
</head>
<body id="home">

    <nav class="navbar">
        <div class="logo">KAYRA <span>PREMIUM</span></div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#stats">STATS</a></li>
        </ul>
    </nav>

    <main class="hero">
        <h1 class="hero-title">PURE LUXURY</h1>
        <p class="hero-subtitle">THE ART OF PERFECTION</p>
    </main>

    <section id="stats" class="stats-section">
        <div class="stat-item">
            <h3 class="counter" data-target="100">0%</h3>
            <p>El İşçiliği</p>
        </div>
        <div class="stat-item">
            <h3 class="counter" data-target="99">0%</h3>
            <p>Müşteri Memnuniyeti</p>
        </div>
        <div class="stat-item">
            <h3 class="counter" data-target="10">0+</h3>
            <p>Global Varlık</p>
        </div>
    </section>

    <script>
        const counters = document.querySelectorAll('.counter');
        let animated = false;

        window.addEventListener('scroll', () => {
            const statsSection = document.getElementById('stats');
            const sectionTop = statsSection.getBoundingClientRect().top;
            
            if (sectionTop < window.innerHeight && !animated) {
                animated = true;
                counters.forEach(counter => {
                    const target = +counter.getAttribute('data-target');
                    const isPercent = counter.getAttribute('data-target') === '100' || counter.getAttribute('data-target') === '99';
                    let count = 0;
                    const duration = 2000;
                    const interval = duration / target;
                    
                    const update = setInterval(() => {
                        count++;
                        counter.innerText = count + (isPercent ? '%' : '+');
                        if (count >= target) clearInterval(update);
                    }, interval);
                });
            }
        });
    </script>
</body>
</html>
